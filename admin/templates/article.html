<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — Quillon</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta name="keywords" content="{{KEYWORDS}}">
  <link rel="canonical" href="{{URL}}">

  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:url" content="{{URL}}">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="Quillon">
  <meta property="og:locale" content="ru_RU">
  <meta property="article:published_time" content="{{PUBLISHED_ISO}}">
  <meta property="article:modified_time" content="{{UPDATED_ISO}}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE}}">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- Theme bootstrap: ставим data-theme до загрузки CSS чтобы не было FOUC -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('q-theme');
        var prefers = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', saved || prefers);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>

  <!-- Quillon design system -->
  <link rel="stylesheet" href="/v4/css/tokens.css">
  <link rel="stylesheet" href="/v4/css/base.css">
  <link rel="stylesheet" href="/v4/css/components.css">
  <script src="/v4/components/quillon-ui.js?v=2" defer></script>

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="Блог Quillon" href="/blog/rss.xml">

  <!-- Schema.org -->
  <script type="application/ld+json">
{{SCHEMA_ORG}}
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Главная", "item": "https://quillon.ru/" },
      { "@type": "ListItem", "position": 2, "name": "Блог", "item": "https://quillon.ru/blog/" },
      { "@type": "ListItem", "position": 3, "name": "{{TITLE}}", "item": "{{URL}}" }
    ]
  }
  </script>

  <style>
    /* Article-specific layout, on top of Quillon design system */
    .q-blog-article {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 var(--q-s-6);
    }
    .q-blog-article__meta {
      padding: 48px 0 24px;
      border-bottom: 1px solid var(--q-line);
      margin-bottom: 40px;
    }
    .q-blog-article__crumbs {
      font-size: 12px;
      color: var(--q-text-low);
      font-family: var(--q-font-mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }
    .q-blog-article__crumbs a { color: var(--q-text-low); text-decoration: none; }
    .q-blog-article__crumbs a:hover { color: var(--q-accent); }
    .q-blog-article__crumbs span { margin: 0 6px; }

    .q-blog-article__title {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: var(--q-fw-medium);
      letter-spacing: -0.025em;
      line-height: 1.1;
      color: var(--q-text-hi);
      margin-bottom: 16px;
    }
    .q-blog-article__desc {
      font-size: 18px;
      color: var(--q-text-mid);
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .q-blog-article__date {
      font-size: 12px;
      font-family: var(--q-font-mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--q-text-low);
    }

    .q-blog-cover {
      margin: 32px 0 40px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--q-line);
      aspect-ratio: 1.78;
      background: var(--q-bg-2);
    }
    .q-blog-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .q-blog-content { padding-bottom: 80px; color: var(--q-text-mid); font-size: 16px; line-height: 1.7; }
    .q-blog-content h2 {
      font-size: clamp(20px, 2.5vw, 28px);
      font-weight: var(--q-fw-medium);
      letter-spacing: -0.02em;
      margin: 48px 0 16px;
      color: var(--q-text-hi);
    }
    .q-blog-content h3 {
      font-size: 18px;
      font-weight: var(--q-fw-medium);
      margin: 32px 0 12px;
      color: var(--q-text-hi);
    }
    .q-blog-content p { margin-bottom: 20px; }
    .q-blog-content ul, .q-blog-content ol { padding-left: 24px; margin-bottom: 20px; }
    .q-blog-content li { margin-bottom: 8px; }
    .q-blog-content strong { color: var(--q-text-hi); font-weight: var(--q-fw-medium); }
    .q-blog-content a {
      color: #5EF2A1;
      text-decoration: underline;
      text-decoration-color: rgba(94,242,161,.3);
    }
    .q-blog-content a:hover { text-decoration-color: #5EF2A1; }
    .q-blog-content blockquote {
      border-left: 2px solid #5EF2A1;
      padding: 12px 20px;
      margin: 24px 0;
      background: var(--q-bg-2);
      border-radius: 0 8px 8px 0;
      color: var(--q-text-mid);
      font-style: italic;
    }
    .q-blog-content pre {
      background: var(--q-bg-3);
      border: 1px solid var(--q-line);
      border-radius: 10px;
      padding: 20px;
      overflow-x: auto;
      margin: 24px 0;
      font-family: var(--q-font-mono);
      font-size: 13px;
      line-height: 1.6;
    }
    .q-blog-content code {
      font-family: var(--q-font-mono);
      font-size: 13px;
      background: var(--q-bg-2);
      padding: 2px 6px;
      border-radius: 4px;
      color: #5EF2A1;
    }
    .q-blog-content pre code { background: none; padding: 0; color: var(--q-text-hi); }
    .q-blog-content hr { border: none; border-top: 1px solid var(--q-line); margin: 40px 0; }

    .q-blog-cta {
      background: var(--q-bg-2);
      border: 1px solid var(--q-line);
      border-top: 2px solid #5EF2A1;
      border-radius: 14px;
      padding: 32px;
      margin: 48px 0;
      text-align: center;
    }
    .q-blog-cta h3 { color: var(--q-text-hi); font-size: 20px; margin-bottom: 12px; }
    .q-blog-cta p { color: var(--q-text-mid); margin-bottom: 20px; }
    .q-blog-cta__btn {
      display: inline-block;
      background: #5EF2A1;
      color: #04070C;
      font-weight: var(--q-fw-semibold);
      font-size: 15px;
      padding: 12px 28px;
      border-radius: 10px;
      text-decoration: none;
      transition: background var(--q-dur-fast) var(--q-ease);
    }
    .q-blog-cta__btn:hover { background: #7DFFB3; }

    /* highlight.js token colors */
    .hljs-keyword { color: #5EF2A1; }
    .hljs-string { color: #F5B544; }
    .hljs-number { color: #F06B8E; }
    .hljs-comment { color: var(--q-text-low); font-style: italic; }
    .hljs-built_in, .hljs-name { color: #9BCBFF; }

    @media (max-width: 640px) {
      .q-blog-article { padding: 0 16px; }
      .q-blog-cta { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<quillon-header accent="mint" current="blog"></quillon-header>

<main id="main" class="q-blog-article">
  <div class="q-blog-article__meta">
    <nav class="q-blog-article__crumbs" aria-label="Хлебные крошки">
      <a href="/">Главная</a><span>→</span>
      <a href="/blog/">Блог</a><span>→</span>
      <span>{{TITLE}}</span>
    </nav>
    <h1 class="q-blog-article__title">{{TITLE}}</h1>
    <p class="q-blog-article__desc">{{DESCRIPTION}}</p>
    <time class="q-blog-article__date" datetime="{{PUBLISHED_ISO}}">{{PUBLISHED_DATE}}</time>
  </div>

  {{COVER_HTML}}

  <article class="q-blog-content">
    {{CONTENT_HTML}}
  </article>

  <div class="q-blog-cta">
    <h3>Хочешь войти в IT за 12 месяцев?</h3>
    <p>Выбери трек — Python, Flutter или QA — и начни с бесплатного вводного урока</p>
    <a href="/#products" class="q-blog-cta__btn">Выбрать трек</a>
  </div>
</main>

<quillon-footer accent="mint"></quillon-footer>

</body>
</html>
