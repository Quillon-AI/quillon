  <style>
    .q-blog-listing { max-width: 1040px; margin: 0 auto; padding: 0 var(--q-s-6); }

    .q-blog-listing__hero {
      padding: 64px 0 48px;
      border-bottom: 1px solid var(--q-line);
    }
    .q-blog-listing__eyebrow {
      font-family: var(--q-font-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #5EF2A1;
      margin-bottom: 16px;
    }
    .q-blog-listing__title {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: var(--q-fw-medium);
      letter-spacing: -0.025em;
      line-height: 1.05;
      color: var(--q-text-hi);
    }
    .q-blog-listing__title span { color: var(--q-text-low); }
    .q-blog-listing__count {
      margin-top: 12px;
      font-size: 14px;
      color: var(--q-text-low);
      font-family: var(--q-font-mono);
    }

    .q-blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1px;
      border: 1px solid var(--q-line);
      margin: 48px 0;
      border-radius: 14px;
      overflow: hidden;
    }
    .blog-card { background: var(--q-bg-1); transition: background var(--q-dur-fast) var(--q-ease); }
    .blog-card:hover { background: var(--q-bg-2); }
    .blog-card a { display: block; padding: 28px; text-decoration: none; color: inherit; height: 100%; }
    .blog-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; margin-bottom: 16px; }
    .blog-card h2 { font-size: 17px; font-weight: var(--q-fw-medium); letter-spacing: -0.01em; color: var(--q-text-hi); margin-bottom: 8px; line-height: 1.3; }
    .blog-card p { font-size: 14px; color: var(--q-text-low); line-height: 1.5; margin-bottom: 16px; }
    .blog-card time { font-family: var(--q-font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--q-text-low); }

    .q-blog-empty { padding: 80px 0; text-align: center; color: var(--q-text-low); }
    .q-blog-empty p { font-size: 16px; }

    @media (max-width: 640px) { .q-blog-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<quillon-header accent="mint" current="blog"></quillon-header>

<main id="main" class="q-blog-listing">
  <div class="q-blog-listing__hero">
    <p class="q-blog-listing__eyebrow">Блог Quillon</p>
    <h1 class="q-blog-listing__title">IT-образование<br><span>без воды</span></h1>
    <p class="q-blog-listing__count">{{COUNT}} статей</p>
  </div>

  <div class="q-blog-grid">
    {{ARTICLES}}
  </div>

  <div id="empty" style="display:none" class="q-blog-empty">
    <p>Статьи скоро появятся</p>
  </div>
</main>

<quillon-footer accent="mint"></quillon-footer>

<script>
  if (!document.querySelector('.blog-card')) {
    document.querySelector('.q-blog-grid').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
  }
</script>
