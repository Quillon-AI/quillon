  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink-00: #04070C; --ink-05: #06090F; --ink-10: #0A0F18; --ink-15: #0E1420;
      --text: #E8EDF5; --text-soft: #C3CBD9; --text-muted: #6B7687;
      --mint: #5EF2A1; --rule: rgba(232,237,245,.10);
      --ff: "Host Grotesk", system-ui, sans-serif;
      --ff-mono: "JetBrains Mono", ui-monospace, monospace;
    }

    @font-face {
      font-family: "Host Grotesk";
      src: url("/fonts/HostGrotesk-Regular.woff2") format("woff2");
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: "Host Grotesk";
      src: url("/fonts/HostGrotesk-Medium.woff2") format("woff2");
      font-weight: 500; font-display: swap;
    }

    body { background: var(--ink-00); color: var(--text); font-family: var(--ff); -webkit-font-smoothing: antialiased; }

    .topbar { border-bottom: 1px solid var(--rule); padding: 20px 24px; display: flex; align-items: center; gap: 24px; }
    .topbar a { color: var(--mint); text-decoration: none; font-weight: 500; }
    .topbar nav { display: flex; gap: 20px; }
    .topbar nav a { color: var(--text-muted); font-size: 14px; text-decoration: none; }
    .topbar nav a:hover { color: var(--text); }

    .container { max-width: 1040px; margin: 0 auto; padding: 0 24px; }

    .listing-hero { padding: 64px 0 48px; border-bottom: 1px solid var(--rule); }
    .listing-eyebrow {
      font-family: var(--ff-mono); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--mint); margin-bottom: 16px;
    }
    .listing-hero h1 { font-size: clamp(32px, 5vw, 56px); font-weight: 500; letter-spacing: -0.025em; line-height: 1.05; }
    .listing-hero h1 span { color: var(--text-muted); }
    .listing-count { margin-top: 12px; font-size: 14px; color: var(--text-muted); font-family: var(--ff-mono); }

    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1px;
      border: 1px solid var(--rule);
      margin: 48px 0;
      border-radius: 14px;
      overflow: hidden;
    }

    .blog-card { background: var(--ink-05); transition: background 140ms; }
    .blog-card:hover { background: var(--ink-10); }
    .blog-card a { display: block; padding: 28px; text-decoration: none; color: inherit; height: 100%; }
    .blog-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 6px; margin-bottom: 16px; }
    .blog-card h2 { font-size: 17px; font-weight: 500; letter-spacing: -0.01em; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
    .blog-card p { font-size: 14px; color: var(--text-muted); line-height: 1.5; margin-bottom: 16px; }
    .blog-card time { font-family: var(--ff-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }

    .empty-state { padding: 80px 0; text-align: center; color: var(--text-muted); }
    .empty-state p { font-size: 16px; }

    footer { border-top: 1px solid var(--rule); padding: 32px 24px; text-align: center; font-size: 13px; color: var(--text-muted); }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--mint); }

    @media (max-width: 640px) { .blog-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header class="topbar">
  <a href="/">Quillon</a>
  <nav>
    <a href="/blog/">Блог</a>
    <a href="/#tracks">Треки</a>
    <a href="/#contact">Записаться</a>
  </nav>
</header>

<main id="main" class="container">
  <div class="listing-hero">
    <p class="listing-eyebrow">Блог Quillon</p>
    <h1>IT-образование<br><span>без воды</span></h1>
    <p class="listing-count">{{COUNT}} статей</p>
  </div>

  <div class="blog-grid">
    {{ARTICLES}}
  </div>

  <div id="empty" style="display:none" class="empty-state">
    <p>Статьи скоро появятся</p>
  </div>
</main>

<footer>
  <p>&copy; 2025 Quillon · <a href="/">quillon.ru</a> · <a href="/blog/rss.xml">RSS</a></p>
</footer>

<script>
  if (!document.querySelector('.blog-card')) {
    document.querySelector('.blog-grid').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
  }
</script>
