# ==========================================================================
# Quillon — Nginx SEO Configuration
# Include this in your main server block: include /path/to/nginx-seo.conf;
# ==========================================================================

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml application/xml;
gzip_min_length 256;

# Cache static assets (30 days)
# ВНИМАНИЕ: НЕ ставим add_header Cache-Control здесь — он сгенерируется
# из expires-директивы. Любой add_header в location ОТМЕНЯЕТ
# наследование add_header из server-блока (security headers пропадут).
location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 30d;
    access_log off;
}

# Cache HTML (short, for fresh content) — без add_header по той же причине
location ~* \.html$ {
    expires 1h;
}

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "1; mode=block" always;

# HSTS — заставить браузер всегда ходить через HTTPS (1 год + субдомены).
# ВАЖНО: включай ТОЛЬКО если уверен, что все субдомены *.quillon.ru
# обслуживаются по HTTPS. Откатить нельзя — браузеры закэшируют.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Permissions-Policy — отключаем доступ к чувствительным API сразу
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# Content-Security-Policy — защита от XSS / data exfiltration.
#   default-src 'self'                         — только свой origin по умолчанию
#   script-src 'self' 'unsafe-inline'          — inline JSON-LD требует unsafe-inline
#   style-src  'self' 'unsafe-inline' fonts.googleapis.com — inline-стили + Google Fonts
#   font-src   'self' fonts.gstatic.com data:  — шрифты Google + локальные
#   img-src    'self' data: blob: https:       — все картинки + base64 + видео-fallback
#   connect-src 'self' b24-o95wtq.bitrix24.ru  — формы стучатся в Bitrix
#   media-src  'self' blob:                    — webm/mp4 black-hole / sphere
#   frame-ancestors 'none'                     — никто не может встроить нас в iframe
#   base-uri 'self'                            — anti-base-tag-injection
#   object-src 'none'                          — никаких <object>, <embed>
#   upgrade-insecure-requests                  — авто-апгрейд http→https
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://b24-o95wtq.bitrix24.ru; media-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;

# Redirect www to non-www
if ($host = www.quillon.ru) {
    return 301 https://quillon.ru$request_uri;
}

# Redirect HTTP to HTTPS
if ($scheme = http) {
    return 301 https://$host$request_uri;
}
