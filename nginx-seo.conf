# ==========================================================================
# Quillon — Nginx SEO Configuration
# Include this in your main server block: include /path/to/nginx-seo.conf;
# ==========================================================================

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml application/xml;
gzip_min_length 256;

# Cache static assets (30 days)
location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Cache HTML (short, for fresh content)
location ~* \.html$ {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
}

# Security headers
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "1; mode=block" always;

# Redirect www to non-www
if ($host = www.quillon.ru) {
    return 301 https://quillon.ru$request_uri;
}

# Redirect HTTP to HTTPS
if ($scheme = http) {
    return 301 https://$host$request_uri;
}
