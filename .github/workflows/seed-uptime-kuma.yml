name: Seed Uptime Kuma Monitors

# Заполнение Uptime Kuma мониторами через прямой SQL в SQLite,
# без использования пользовательского пароля (через сервер и docker exec).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "schema (только посмотреть) или seed (записать мониторы)"
        required: true
        default: "schema"
        type: choice
        options:
          - schema
          - seed

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.QUILLON_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.QUILLON_HOST }} >> ~/.ssh/known_hosts

      - name: Inspect Kuma DB schema
        if: ${{ inputs.mode == 'schema' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.QUILLON_USER }}@${{ secrets.QUILLON_HOST }} bash <<'REMOTE'
          set -e
          echo "=== таблицы Kuma ==="
          docker exec uptime-kuma sqlite3 /app/data/kuma.db ".tables"
          echo ""
          echo "=== schema.monitor ==="
          docker exec uptime-kuma sqlite3 /app/data/kuma.db ".schema monitor"
          echo ""
          echo "=== schema.notification ==="
          docker exec uptime-kuma sqlite3 /app/data/kuma.db ".schema notification"
          echo ""
          echo "=== schema.user (только id+username, без секретов) ==="
          docker exec uptime-kuma sqlite3 /app/data/kuma.db "SELECT id, username, active FROM user;"
          echo ""
          echo "=== уже существующие мониторы ==="
          docker exec uptime-kuma sqlite3 -header -column /app/data/kuma.db "SELECT id, name, type, url, active FROM monitor;"
          echo ""
          echo "=== schema.heartbeat ==="
          docker exec uptime-kuma sqlite3 /app/data/kuma.db ".schema heartbeat" | head -20
          echo ""
          echo "=== индексы ==="
          docker exec uptime-kuma sqlite3 /app/data/kuma.db "SELECT name, tbl_name FROM sqlite_master WHERE type='index' AND tbl_name='monitor';"
          REMOTE

      - name: Seed monitors
        if: ${{ inputs.mode == 'seed' }}
        env:
          USER_AT_HOST: ${{ secrets.QUILLON_USER }}@${{ secrets.QUILLON_HOST }}
        run: |
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $USER_AT_HOST"
          SCP="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          # 0. Бэкап БД
          $SSH "docker exec uptime-kuma sh -c 'cp /app/data/kuma.db /app/data/kuma.db.bak.\$(date +%s)'"
          echo "✓ backup created"

          # 1. Скопировать SQL-файл на сервер, потом в контейнер
          $SCP ./uptime-kuma/seed-monitors.sql $USER_AT_HOST:/tmp/seed-monitors.sql
          $SSH "docker cp /tmp/seed-monitors.sql uptime-kuma:/tmp/seed-monitors.sql"

          # 2. Выполнить SQL-файл через sqlite3 < file (надёжно, без heredoc-issues)
          echo "═══ выполняем SQL ═══"
          $SSH "docker exec uptime-kuma sh -c 'sqlite3 /app/data/kuma.db < /tmp/seed-monitors.sql'"

          echo ""
          echo "═══ проверка после INSERT ═══"
          $SSH "docker exec uptime-kuma sqlite3 /app/data/kuma.db 'SELECT COUNT(*) FROM monitor;'"
          $SSH "docker exec uptime-kuma sqlite3 -header -column /app/data/kuma.db 'SELECT id, name, type, interval, active FROM monitor ORDER BY id;'"

          echo ""
          echo "═══ restart Kuma чтобы подхватить ═══"
          $SSH "cd /opt/uptime-kuma && docker compose restart"
          sleep 15
          $SSH "docker compose -f /opt/uptime-kuma/docker-compose.yml ps"

          echo ""
          echo "═══ smoke test ═══"
          curl -sI https://status.quillon.ru/ | head -3
